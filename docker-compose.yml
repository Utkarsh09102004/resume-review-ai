services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resumeforge
      POSTGRES_USER: resumeforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumeforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  texlive:
    build: ./texlive
    tmpfs:
      - /tmp/latex-compile:size=500M,uid=1001,gid=1001
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://resumeforge:${DB_PASSWORD:-devpassword}@postgres:5432/resumeforge
      TEXLIVE_URL: http://texlive:3001
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      LOGTO_JWKS_URL: ${LOGTO_JWKS_URL:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      texlive:
        condition: service_healthy
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_AUTH_ENABLED: ${AUTH_ENABLED:-false}
        NEXT_PUBLIC_BASE_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    environment:
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET:-complex_password_at_least_32_characters_long_for_dev}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
    restart: unless-stopped

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
