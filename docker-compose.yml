services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resumeforge
      POSTGRES_USER: resumeforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumeforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  texlive:
    build: ./texlive
    tmpfs:
      - /tmp/latex-compile:size=500M,uid=1001,gid=1001
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://resumeforge:${DB_PASSWORD:-devpassword}@postgres:5432/resumeforge
      TEXLIVE_URL: http://texlive:3001
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      LOGTO_JWKS_URL: ${LOGTO_JWKS_URL:-http://localhost:3001/oidc/jwks}
    depends_on:
      postgres:
        condition: service_healthy
      texlive:
        condition: service_healthy
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
    restart: unless-stopped

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
